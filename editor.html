<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Constant camber (TS) — sweep a station along the sheer</title>
<style>
  :root{
    --sheer:#dd6b20; --keel:#0f766e; --aft:#2b6cb0; --fore:#7c3aed; --station:#94a3b8;
    --wl:#0ea5e9; --bt:#64748b; --deck:#cbd5e1; --transom:#b45309;
    --ink:#1a202c; --mut:#718096; --bg:#f7fafc; --panel:#ffffff; --line:#e2e8f0;
    --slider:#e11d48;
  }
  *{box-sizing:border-box}
  html,body{height:100%;}
  body{margin:0;font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       color:var(--ink);background:var(--bg);}
  /* app shell: everything fits the window — a full-width toolbar across the very top, then two columns:
     the LEFT column stacks the 3D view, the plan, and the profile; the RIGHT column stacks the tabbed
     section editor (a true square) and the vertical blend control. No page scroll. */
  .app{display:flex;flex-direction:column;height:100vh;overflow:hidden;
       user-select:none;-webkit-user-select:none;} /* drawing tool: don't select text while dragging */
  .main{display:flex;gap:14px;flex:1 1 0;min-height:0;padding:14px 24px;justify-content:center;}
  /* left column: 3D (flexes to fill) above the plan and profile strips (sized by their isometric aspect) */
  .leftcol{flex:1 1 0;min-width:0;min-height:0;display:flex;flex-direction:column;gap:10px;}
  .top3d{position:relative;flex:1 1 0;min-height:140px;border:1px solid var(--line);border-radius:10px;
         overflow:hidden;background:linear-gradient(#eef3f8,#d7e0ea);}
  .view3dctl{position:absolute;top:10px;right:14px;display:flex;gap:0;z-index:1;}
  /* segmented control: joined buttons, one active */
  .view3dctl .vmode{border-radius:0;margin-left:-1px;}
  .view3dctl .vmode:first-child{border-radius:8px 0 0 8px;margin-left:0;}
  .view3dctl .vmode:last-child{border-radius:0 8px 8px 0;}
  .view3dctl .vmode.on{background:var(--ink);color:#fff;border-color:var(--ink);position:relative;z-index:1;}
  /* lines-plan overlay: white, covers the GL canvas; pointer-events pass through so drag-rotate still works */
  .lines3d{position:absolute;inset:0;width:100%;height:100%;background:#ebeef2;pointer-events:none;}
  .viewstrip{flex:0 0 auto;width:100%;border:1px solid var(--line);border-radius:10px;background:var(--panel);
             overflow:hidden;}
  .viewstrip svg{display:block;width:100%;height:auto;}
  /* right column: its width is the square's side (set by fitLayout in main.ts); the section editor sits on
     top as a true square, the blend control fills the rest below it. */
  .rightcol{flex:0 0 auto;min-height:0;display:flex;flex-direction:column;gap:10px;}
  /* upper card: the section template editor; lower card: the live cut station (broken out of the tabs) */
  .sidecard,.cutcard{flex:0 0 auto;display:flex;flex-direction:column;}
  .cutcard .cap{margin-bottom:8px;}
  .sidefit{flex:0 0 auto;min-height:0;display:flex;align-items:center;justify-content:center;}
  .sidepanel{position:relative;width:100%;aspect-ratio:1;} /* a true square that fills the column width */
  /* keel-knuckle slider for the active template, pinned under the square */
  .keelrow{flex:0 0 auto;margin-top:8px;}
  .keelrow .ctl{display:flex;align-items:center;gap:8px;width:100%;}
  .keelrow .ctl input[type=range]{flex:1;width:auto;}
  .keelrow .ctl.disabled{opacity:.4;}
  .sidepanel > #templateCards{position:absolute;inset:0;}
  .sidepanel > svg{position:absolute;inset:0;}
  .sidepanel svg{width:100%;height:100%;display:block;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 16px;}
  .tabstrip{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
  .tab{border:1px solid var(--line);background:#fff;border-radius:7px;padding:4px 11px;font:inherit;font-size:12px;
       color:#4a5568;cursor:pointer;display:inline-flex;align-items:center;gap:6px;line-height:1.4;}
  .tab:hover{background:#f1f5f9;}
  .tab.tpltab{color:var(--tab);font-weight:600;}
  .tab.active{background:var(--tab,var(--ink));border-color:var(--tab,var(--ink));color:#fff;}
  .tab .tabx{font-size:10px;opacity:.85;}
  .tab .tabx:hover{opacity:1;}
  .tab.tabadd{font-weight:700;color:var(--mut);padding:4px 9px;}
  .tab.tabadd:disabled{opacity:.4;cursor:not-allowed;}
  .tabsep{width:1px;align-self:stretch;background:var(--line);margin:2px 3px;}
  /* the toolbar: a single full-width row across the very top of the app, so the section editor below can
     own the whole right column. Wraps to a second row only on a narrow window. */
  .appbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;
          padding:10px 20px;border-bottom:1px solid var(--line);background:var(--panel);}
  .appbar button{padding:6px 10px;}
  .appbar .selinfo{gap:8px;} /* contextual selection info, constant width — no reflow on select */
  .appbar .sel-label{min-width:92px;} /* reserve room for "No point selected" so the bar doesn't jump */
  .appbar .sel-knuckle{flex:0 0 auto;min-width:120px;}
  .appbar .sel-knuckle input{flex:0 0 66px;width:66px;}
  .appbar .ctl input[type=range]{width:84px;}
  .toolacts{display:flex;align-items:center;gap:8px;margin-left:auto;} /* right-align actions; wraps only if it can't fit */
  .cap{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);margin:0 0 8px;
       display:flex;justify-content:space-between;align-items:baseline;}
  .cap .val{text-transform:none;letter-spacing:0;font-weight:600;color:var(--ink);font-size:13px;}
  .cap .tag{text-transform:none;letter-spacing:0;font-weight:700;font-size:12px;padding:1px 8px;border-radius:10px;color:#fff;}
  svg{display:block;width:100%;height:auto;touch-action:none;}
  #cv3d{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:grab;background:transparent;}
  button.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  button.on:hover{background:var(--ink);}
  .hint{font-size:12px;color:var(--mut);margin-top:8px;}
  button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 12px;font:inherit;
         cursor:pointer;color:#4a5568;}
  button:hover{background:#f1f5f9;}
  .barrow{display:flex;gap:10px;align-items:center;margin-bottom:4px;flex-wrap:wrap;}
  .toolbar{display:inline-flex;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .toolbar .tool{display:inline-flex;align-items:center;gap:6px;border:0;border-left:1px solid var(--line);
                 border-radius:0;padding:6px 12px;}
  .toolbar .tool:first-child{border-left:0;}
  .toolbar .tool svg{width:14px;height:14px;display:block;}
  .toolbar .tool.active{background:var(--ink);color:#fff;}
  .toolbar .tool.active:hover{background:var(--ink);}
  .selinfo{display:flex;gap:8px;align-items:center;}
  .selinfo .sel-label{font-weight:600;color:var(--ink);font-size:13px;}
  .selinfo .sel-label.muted{color:var(--mut);font-weight:400;}
  .selinfo .sel-knuckle{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--mut);}
  .selinfo .sel-knuckle input{flex:1;width:auto;vertical-align:middle;}
  .selinfo .sel-knuckle:has(input:disabled){opacity:.45;}
  #selDelete{align-self:flex-start;}
  #selDelete:disabled,#selKnuckle:disabled{opacity:.4;cursor:not-allowed;}
  .ctl{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--mut);}
  .ctl input[type=range]{width:92px;vertical-align:middle;}
  .ctl .ctlval{font-weight:600;color:var(--ink);min-width:38px;}
  /* the open-design name: an editable title at the start of the action group */
  .docname{font:inherit;font-weight:600;color:var(--ink);background:transparent;
       border:1px solid transparent;border-radius:6px;padding:4px 8px;max-width:190px;}
  .docname::placeholder{color:var(--mut);font-weight:400;}
  .docname:hover{border-color:var(--line);}
  .docname:focus{outline:none;border-color:#2b6cb0;background:#fff;}
  .docname.dirty{border-color:#dd9b20;} /* amber edge while there are unsaved edits */
  /* save status text next to the Save button */
  .savestate{font-size:12px;min-width:90px;color:var(--mut);}
  .savestate.dirty{color:#b7791f;}
  .savestate.saved{color:#2f855a;}
</style>
</head>
<body>
<div class="app">
  <div class="appbar">
    <div class="toolbar" id="toolbar">
      <button class="tool active" data-tool="select" title="Select — click a point to select it, then drag to move, Delete to remove, or set its knuckle">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 1.4l9.6 5.3-4.3.9-1 4.4z"/></svg>Select</button>
      <button class="tool" data-tool="add" title="Add — click empty space in an editor to add a control point there">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>Add</button>
    </div>
    <div class="selinfo" id="selinfo">
      <span class="sel-label muted" id="selLabel">No point selected</span>
      <label class="sel-knuckle" id="selKnuckleWrap">Knuckle
        <input type="range" id="selKnuckle" min="0" max="1" step="0.01" title="0 = smooth · 1 = hard corner">
      </label>
      <button id="selDelete" title="Delete the selected point (Delete / Backspace)">Delete</button>
    </div>
    <span class="tabsep"></span>
    <label class="ctl" title="Design waterline — depth below the sheer origin (deck datum)">WL
      <input type="range" id="wlRange" min="0" max="1400" step="10">
      <span class="ctlval" id="wlVal"></span></label>
    <label class="ctl" title="Deck rake — bow-up trim angle; rotates the whole hull about the sheer origin">Rake
      <input type="range" id="rakeRange" min="-12" max="12" step="0.5">
      <span class="ctlval" id="rakeVal"></span></label>
    <div class="toolacts">
      <input id="docName" class="docname" placeholder="Untitled" maxlength="120"
             title="Design name — edit to rename" spellcheck="false">
      <span class="savestate" id="saveState"></span>
      <button id="saveDesign" title="Save the design (Ctrl/Cmd-S) — becomes “Save As” when you change the name">Save</button>
      <button id="revertDesign" title="Discard changes since the last save">Revert</button>
      <span class="tabsep"></span>
      <button id="toFiles" title="Close and return to the design library">Close</button>
    </div>
  </div>
  <div class="main">
    <div class="leftcol">
      <div class="top3d">
        <canvas id="cv3d"></canvas>
        <svg id="lines3d" class="lines3d" style="display:none"></svg>
        <div class="view3dctl" id="view3dModes">
          <button class="vmode on" data-mode="render" title="Shaded hull">Render</button>
          <button class="vmode" data-mode="body" title="Lines plan — body (stations)">Body</button>
          <button class="vmode" data-mode="buttocks" title="Lines plan — buttocks (constant-y cuts)">Buttocks</button>
          <button class="vmode" data-mode="waterline" title="Lines plan — waterlines (constant-z cuts)">Waterline</button>
          <button class="vmode" data-mode="zebra" title="Zebra-stripe fairness check">Zebra</button>
          <button class="vmode" data-mode="sheet" title="Untrimmed swept sheet (one side)">Sheet</button>
        </div>
      </div>
      <div class="viewstrip"><svg id="svgWeights" viewBox="0 0 1000 150" preserveAspectRatio="xMidYMid meet"></svg></div>
      <div class="viewstrip"><svg id="svgPlan" viewBox="0 0 1000 278" preserveAspectRatio="xMidYMid meet"></svg></div>
      <div class="viewstrip"><svg id="svgProfile" viewBox="0 0 1000 422.4" preserveAspectRatio="xMidYMid meet"></svg></div>
    </div>
    <div class="rightcol">
      <div class="card sidecard">
        <div class="tabstrip" id="sideTabs"></div>
        <div class="sidefit">
          <div class="sidepanel">
            <div id="templateCards"></div>
          </div>
        </div>
        <div class="keelrow">
          <label class="ctl" id="keelCtl" title="Keel knuckle for the active template — 0 = smooth (C¹ across the centerline), 1 = a hard V">Keel
            <input type="range" id="keelRange" min="0" max="1" step="0.01">
            <span class="ctlval" id="keelVal">—</span></label>
        </div>
      </div>
      <div class="card cutcard">
        <div class="cap">Cut <span class="val" id="profVal">—</span></div>
        <div class="sidefit">
          <div class="sidepanel">
            <svg id="svgCut" viewBox="0 0 360 360"></svg>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="dist/camber.js"></script>
</body>
</html>
