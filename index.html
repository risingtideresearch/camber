<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Constant camber (TS) — sweep a station along the sheer</title>
<style>
  :root{
    --sheer:#dd6b20; --keel:#0f766e; --aft:#2b6cb0; --fore:#7c3aed; --station:#94a3b8;
    --wl:#0ea5e9; --bt:#64748b; --deck:#cbd5e1; --transom:#b45309;
    --ink:#1a202c; --mut:#718096; --bg:#f7fafc; --panel:#ffffff; --line:#e2e8f0;
    --slider:#e11d48;
  }
  *{box-sizing:border-box}
  html,body{height:100%;}
  body{margin:0;font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       color:var(--ink);background:var(--bg);}
  /* app shell: everything fits the window — the 3D view + tabbed editor/toolbar pinned across the top, the
     plan/profile/blend views in one tabbed card below. No page scroll; the editors fit-to-box. */
  .app{display:flex;flex-direction:column;height:100vh;overflow:hidden;
       user-select:none;-webkit-user-select:none;} /* drawing tool: don't select text while dragging */
  .top{display:flex;gap:14px;flex:3 1 0;min-height:0;padding:14px 24px 0;}
  .top3d{position:relative;flex:1 1 auto;min-width:0;border:1px solid var(--line);border-radius:10px;
         overflow:hidden;background:linear-gradient(#eef3f8,#d7e0ea);}
  .view3dctl{position:absolute;top:10px;right:14px;display:flex;gap:8px;z-index:1;}
  .top .side{flex:0 0 384px;min-height:0;display:flex;flex-direction:column;gap:14px;}
  .sidecard{flex:1 1 0;min-height:0;display:flex;flex-direction:column;}
  .sidepanel{position:relative;flex:1 1 0;min-height:0;}
  .sidepanel > #templateCards{position:absolute;inset:0;}
  .sidepanel > svg{position:absolute;inset:0;}
  .sidepanel svg{width:100%;height:100%;display:block;}
  .bottom{flex:2 1 0;min-height:0;display:flex;padding:14px 24px;}
  .widecard{flex:1 1 0;min-height:0;display:flex;flex-direction:column;}
  .widehead{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:8px;}
  .widehead .tabstrip{margin-bottom:0;}
  .widehead .wide-right{display:flex;align-items:center;gap:12px;}
  .widehead .val{font-weight:600;color:var(--ink);font-size:13px;white-space:nowrap;}
  #addBlendBtn[hidden]{display:none;}
  .widepanel{position:relative;flex:1 1 0;min-height:0;}
  .widepanel svg{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 16px;}
  .tabstrip{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
  .tab{border:1px solid var(--line);background:#fff;border-radius:7px;padding:4px 11px;font:inherit;font-size:12px;
       color:#4a5568;cursor:pointer;display:inline-flex;align-items:center;gap:6px;line-height:1.4;}
  .tab:hover{background:#f1f5f9;}
  .tab.tpltab{color:var(--tab);font-weight:600;}
  .tab.active{background:var(--tab,var(--ink));border-color:var(--tab,var(--ink));color:#fff;}
  .tab .tabx{font-size:10px;opacity:.85;}
  .tab .tabx:hover{opacity:1;}
  .tab.tabadd{font-weight:700;color:var(--mut);padding:4px 9px;}
  .tab.tabadd:disabled{opacity:.4;cursor:not-allowed;}
  .tabsep{width:1px;align-self:stretch;background:var(--line);margin:2px 3px;}
  /* the toolbar, relocated to a vertical column in the side */
  .toolcol{display:flex;flex-direction:column;gap:12px;}
  .toolcol .toolbar{align-self:flex-start;}
  .toolcol .selinfo{flex-direction:column;align-items:stretch;gap:8px;} /* constant height — no reflow on select */
  .toolcol .ctl{display:flex;align-items:center;gap:8px;}
  .toolcol .ctl input[type=range]{flex:1;width:auto;}
  .toolacts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .toolacts button{width:100%;}
  .cap{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);margin:0 0 8px;
       display:flex;justify-content:space-between;align-items:baseline;}
  .cap .val{text-transform:none;letter-spacing:0;font-weight:600;color:var(--ink);font-size:13px;}
  .cap .tag{text-transform:none;letter-spacing:0;font-weight:700;font-size:12px;padding:1px 8px;border-radius:10px;color:#fff;}
  svg{display:block;width:100%;height:auto;touch-action:none;}
  #cv3d{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:grab;background:transparent;}
  button.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  button.on:hover{background:var(--ink);}
  .hint{font-size:12px;color:var(--mut);margin-top:8px;}
  button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 12px;font:inherit;
         cursor:pointer;color:#4a5568;}
  button:hover{background:#f1f5f9;}
  .barrow{display:flex;gap:10px;align-items:center;margin-bottom:4px;flex-wrap:wrap;}
  .toolbar{display:inline-flex;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .toolbar .tool{display:inline-flex;align-items:center;gap:6px;border:0;border-left:1px solid var(--line);
                 border-radius:0;padding:6px 12px;}
  .toolbar .tool:first-child{border-left:0;}
  .toolbar .tool svg{width:14px;height:14px;display:block;}
  .toolbar .tool.active{background:var(--ink);color:#fff;}
  .toolbar .tool.active:hover{background:var(--ink);}
  .selinfo{display:flex;gap:8px;align-items:center;}
  .selinfo .sel-label{font-weight:600;color:var(--ink);font-size:13px;}
  .selinfo .sel-label.muted{color:var(--mut);font-weight:400;}
  .selinfo .sel-knuckle{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--mut);}
  .selinfo .sel-knuckle input{flex:1;width:auto;vertical-align:middle;}
  .selinfo .sel-knuckle:has(input:disabled){opacity:.45;}
  #selDelete{align-self:flex-start;}
  #selDelete:disabled,#selKnuckle:disabled{opacity:.4;cursor:not-allowed;}
  .ctl{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--mut);}
  .ctl input[type=range]{width:92px;vertical-align:middle;}
  .ctl .ctlval{font-weight:600;color:var(--ink);min-width:38px;}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="top3d">
      <canvas id="cv3d"></canvas>
      <div class="view3dctl">
        <button id="toggleZebra">Zebra</button>
        <button id="toggle3d">Untrimmed sheet</button>
      </div>
    </div>
    <div class="side">
      <div class="card toolcol">
        <div class="toolbar" id="toolbar">
          <button class="tool active" data-tool="select" title="Select — click a point to select it, then drag to move, Delete to remove, or set its knuckle">
            <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 1.4l9.6 5.3-4.3.9-1 4.4z"/></svg>Select</button>
          <button class="tool" data-tool="add" title="Add — click empty space in an editor to add a control point there">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>Add</button>
        </div>
        <div class="selinfo" id="selinfo">
          <span class="sel-label muted" id="selLabel">No point selected</span>
          <label class="sel-knuckle" id="selKnuckleWrap">Knuckle
            <input type="range" id="selKnuckle" min="0" max="1" step="0.01" title="0 = smooth · 1 = hard corner">
          </label>
          <button id="selDelete" title="Delete the selected point (Delete / Backspace)">Delete</button>
        </div>
        <label class="ctl" title="Design waterline — depth below the sheer origin (deck datum)">WL
          <input type="range" id="wlRange" min="0" max="1400" step="10">
          <span class="ctlval" id="wlVal"></span></label>
        <label class="ctl" title="Deck rake — bow-up trim angle; rotates the whole hull about the sheer origin">Rake
          <input type="range" id="rakeRange" min="-12" max="12" step="0.5">
          <span class="ctlval" id="rakeVal"></span></label>
        <div class="toolacts">
          <button id="reset">Reset</button>
          <button id="importJson" title="Load a hull model from a JSON file (replaces the current model)">Import JSON</button>
          <button id="exportStep" title="Export the hull surfaces as a STEP (ISO 10303) file">Export STEP</button>
          <button id="exportJson" title="Export the editable hull model (sheer, transom, templates, weight curve) as JSON">Export JSON</button>
        </div>
      </div>
      <div class="card sidecard">
        <div class="tabstrip" id="sideTabs"></div>
        <div class="sidepanel">
          <div id="templateCards"></div>
          <svg id="svgCut" viewBox="0 0 360 360"></svg>
          <svg id="svgBody" viewBox="0 0 360 360"></svg>
        </div>
      </div>
    </div>
  </div>
  <div class="bottom">
    <div class="card widecard">
      <div class="widehead">
        <div class="tabstrip" id="wideTabs"></div>
        <span class="wide-right">
          <button id="addBlendBtn" title="Add a blend control point midway in the widest gap" hidden>+ blend point</button>
          <span class="val" id="profVal">—</span>
        </span>
      </div>
      <div class="widepanel">
        <svg id="svgPlan" viewBox="0 0 1000 520" preserveAspectRatio="xMidYMid meet"></svg>
        <svg id="svgProfile" viewBox="0 0 1000 422.4" preserveAspectRatio="xMidYMid meet"></svg>
        <svg id="svgWeights" viewBox="0 0 1000 176" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
    </div>
  </div>
</div>

<script type="module" src="dist/camber.js"></script>
</body>
</html>
