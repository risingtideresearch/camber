<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Camber — design library</title>
<style>
  :root{
    --ink:#1a202c; --mut:#718096; --bg:#f7fafc; --panel:#ffffff; --line:#e2e8f0;
    --accent:#2b6cb0; --danger:#c0392b;
  }
  *{box-sizing:border-box}
  html,body{height:100%;}
  body{margin:0;font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       color:var(--ink);background:var(--bg);}
  .fileapp{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  /* top brand bar */
  .filebar{display:flex;align-items:center;gap:16px;padding:14px 24px;border-bottom:1px solid var(--line);
       background:var(--panel);}
  .brand{font-size:18px;font-weight:700;}
  .brand span{font-weight:400;color:var(--mut);font-size:14px;margin-left:8px;}
  .filebar .spacer{flex:1;}
  button{font:inherit;border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 14px;
       color:#2d3748;cursor:pointer;}
  button:hover{background:#f1f5f9;}
  button:disabled{opacity:.45;cursor:not-allowed;}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  button.primary:hover{background:#255792;}
  button.danger{color:var(--danger);border-color:#f1c4bd;}
  button.danger:hover{background:#fdecea;}
  /* selection action strip */
  .seltoolbar{display:flex;align-items:center;gap:10px;padding:12px 24px;border-bottom:1px solid var(--line);
       background:var(--panel);}
  .seltoolbar .selname{font-weight:600;color:var(--ink);max-width:40vw;overflow:hidden;
       text-overflow:ellipsis;white-space:nowrap;}
  .seltoolbar .selname.none{font-weight:400;color:var(--mut);}
  .seltoolbar .spacer{flex:1;}
  /* the grid of designs */
  .gridwrap{flex:1;overflow-y:auto;padding:24px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;cursor:pointer;
       transition:border-color .12s, box-shadow .12s;display:flex;flex-direction:column;gap:6px;}
  .card:hover{border-color:#cbd5e1;box-shadow:0 2px 10px rgba(0,0,0,.05);}
  .card.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(43,108,176,.25);}
  .card .preview{width:100%;height:108px;display:block;object-fit:contain;background:#f8fafc;
       border:1px solid var(--line);border-radius:8px;margin-bottom:4px;padding:6px;}
  .card .preview.noprev{display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:12px;}
  .card .cname{font-weight:600;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .card .cdate{font-size:12px;color:var(--mut);}
  .empty{color:var(--mut);padding:40px 0;text-align:center;}
  .empty.err{color:var(--danger);}
</style>
</head>
<body>
<div class="fileapp">
  <div class="filebar">
    <div class="brand">Camber <span>design library</span></div>
    <div class="spacer"></div>
    <button id="newDesign" class="primary" title="Start a new hull in the editor">+ New design</button>
    <button id="importJson" title="Add a hull design from a JSON file to the library">Import JSON…</button>
  </div>
  <div class="seltoolbar">
    <span class="selname none" id="selName">No design selected</span>
    <span class="spacer"></span>
    <button id="openBtn" disabled title="Open the selected design in the editor">Open</button>
    <button id="exportJsonBtn" disabled title="Download the selected design as JSON">Export JSON</button>
    <button id="exportStepBtn" disabled title="Export the selected design as a STEP (ISO 10303) file">Export STEP</button>
    <button id="deleteBtn" class="danger" disabled title="Delete the selected design">Delete</button>
  </div>
  <div class="gridwrap">
    <div class="grid" id="grid"></div>
    <div class="empty" id="emptyMsg" style="display:none"></div>
  </div>
</div>

<script type="module" src="dist/files.js"></script>
</body>
</html>
